name: Build

on:
  push:
  pull_request:

jobs:
  build-and-test:
    # macOS 26 runner ships Xcode 26 / Swift 6.3, which the package's
    # swift-tools-version: 6.3 requires (older images only have Swift 5.10).
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift tests
        run: swift test

      - name: Xcode build
        run: xcodebuild -scheme Transcriptor -destination 'platform=macOS' build
